name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        # single-repo layout: backend lives in a subdirectory (spec feature_1.0 D1)
        working-directory: Repair_Logic_Agent
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # Feature 2.3: vision tests need tesseract; Feature 2.4: STT tests need ffmpeg
      # (both skip without their binary)
      - run: sudo apt-get update && sudo apt-get install -y tesseract-ocr ffmpeg
      - run: uv sync
      - run: uv run ruff check app tests
      - run: uv run ruff format --check app tests
      - run: uv run pytest
