# Spare Parts Data & Cross Reference Tools
# How the agent will look up part equivalents for common wear items.

cross_reference_tools:
  - brand: "SKF"
    tool_name: "SKF Croesus / SKF Interchange"
    url: "https://www.skf.com"
    usage: "Input competitor bearing number (e.g. FAG) to find SKF equivalent."

  - brand: "Schaeffler (FAG/INA)"
    tool_name: "Schaeffler Medias Interchange"
    url: "https://interchange.schaeffler.com/"
    usage: "Excellent for European machinery. Supports wildcard searches."

common_cnc_bearings:
  # Example structured data for spindle bearings (Super Precision)
  - type: "Angular Contact Thrust Ball Bearing (Spindle)"
    skf_prefix: "70.. 719.. 72.. (Precision classes P4, P4A, PA9)"
    fag_prefix: "B70.. B719.. B72.. (Precision classes P4, P4S)"
    notes: "Never substitute a standard grade bearing for a P4/P4S spindle bearing. Suffixes denote preload (Light, Medium, Heavy) and contact angle (15 deg, 25 deg). They MUST match."

  - type: "Ball Screw Support Bearings"
    skf_prefix: "BSA 2.. BSD .."
    fag_prefix: "BSB .. ZKLN .."
    notes: "High axial load capacity. Often mounted in pairs or quads."
