# CNC ML Dataset Registry
# These datasets are primarily for future sensor-fusion/predictive maintenance,
# but they provide excellent ground-truth data on what faults actually look like.

datasets:
  - name: "Bosch CNC Machining Dataset"
    source: "https://github.com/boschresearch/CNC_Machining"
    domain: "CNC Milling"
    data_type: "High-frequency vibration (X,Y,Z axes)"
    use_case: "Detecting anomalous operation (wear, chatter) vs normal operation."
    relevance: "High - Real brownfield industrial data from a production machine."

  - name: "Multi-Sensor CNC Tool Wear Dataset"
    source: "Kaggle (search 'CNC Tool Wear')"
    domain: "Milling"
    data_type: "Cutting forces, vibration, acoustic emission"
    use_case: "Predicting tool wear state (Healthy, Moderate, Worn) and flank wear."
    relevance: "Medium - Focuses on the cutting tool, whereas we focus on machine repair, but methodologies overlap."

  - name: "Machine-Fault-Dataset (Aggregator)"
    source: "https://github.com/CHAOZHAO-1/Machine-Fault-Dataset"
    domain: "General rotating machinery"
    data_type: "Vibration, Acoustic, Current"
    use_case: "Bearing and gear fault diagnosis (e.g., CWRU dataset, Paderborn dataset)."
    relevance: "High - CWRU bearing dataset is the gold standard for understanding what a bearing fault looks like in frequency domain."
