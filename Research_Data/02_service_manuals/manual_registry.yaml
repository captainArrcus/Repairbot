# CNC Service Manual Registry (Phase 1 Seed)
# This file tracks WHERE to get official documentation.
# Note: Many OEM manuals are behind login walls or require machine serial numbers.

portals:
  - name: Siemens Industry Online Support (SIOS)
    url: "https://support.industry.siemens.com/"
    target_controllers: ["SINUMERIK 840D sl", "SINUMERIK 828D", "SINUMERIK ONE"]
    access_level: "Free / Registration recommended"
    document_types:
      - "Diagnostics Manuals (Alarms)"
      - "Function Manuals"
      - "Parameter Manuals"
    notes: "Best source for NC and Drive (SINAMICS) alarms. PDFs are freely downloadable. Version-specific."

  - name: Heidenhain Documentation Portal
    url: "https://www.heidenhain.com/service/downloads/documentation"
    target_controllers: ["TNC 640", "iTNC 530", "TNC 7"]
    access_level: "Mixed (User manuals free, Service manuals restricted)"
    document_types:
      - "User Manuals"
      - "Conversational Programming Manuals"
      - "Service Manuals (Filebase - restricted)"
    notes: "Basic error lists are in User Manuals. Deep diagnostic info requires Filebase access (for authorized service partners)."

  - name: my DMG MORI
    url: "https://mydmgmori.com/"
    target_machines: ["DMG MORI CNC Lathes and Mills"]
    access_level: "Restricted (Requires machine serial number)"
    document_types:
      - "Machine-specific Maintenance Manuals"
      - "Wiring Diagrams"
      - "PLC Alarm Lists (700xxx range)"
    notes: "Crucial for PLC alarms which are OEM-specific. Must partner with an SME to get access to their portal for their machine."

  - name: Fanuc America / Global Portals
    url: "https://www.fanucamerica.com/"
    target_controllers: ["0i", "30i", "16i"]
    access_level: "Proprietary / Paid"
    document_types:
      - "Maintenance Manuals"
      - "Parameter Manuals"
    notes: "Fanuc is notoriously closed. Manuals (e.g., B-64485EN) are usually purchased or provided on CD with the machine. Rely on machine builder docs first."
