# CNC Community Knowledge & Forum Sources
# These forums contain real-world diagnostic traces (Symptoms -> Checks -> Fixes).

forums:
  - name: IndustryArena (German)
    url: "https://de.industryarena.com/forum/"
    relevance: "High"
    focus_areas: ["Siemens SINUMERIK", "Heidenhain TNC", "DMG MORI", "Programming & Troubleshooting"]
    crawl_strategy: "Target specific sub-forums (e.g., Siemens Steuerungen). Respect robots.txt. Excellent source for OEM-specific quirks."

  - name: Zerspanungsbude (German)
    url: "https://forum.zerspanungsbude.net/"
    relevance: "Medium-High"
    focus_areas: ["Older/Retrofit machines", "Mechanical repairs", "Spindle/Bearing replacements"]
    crawl_strategy: "Requires login for some areas. Very high quality mechanical advice. Use 'site:' search operators to find open threads."

  - name: Practical Machinist (English)
    url: "https://www.practicalmachinist.com/forum/"
    relevance: "High"
    focus_areas: ["Fanuc alarms", "Mechanical diagnosis", "Haas/Mazak/Mori Seiki"]
    crawl_strategy: "Massive archive. Search for specific alarm codes (e.g., 'Fanuc SV401')."

  - name: CNCzone (English)
    url: "https://www.cnczone.com/forums/"
    relevance: "Medium"
    focus_areas: ["Retrofits", "Fanuc", "Basic troubleshooting"]
    crawl_strategy: "Lots of hobbyist noise, but the 'Commercial CNC Machines' subforums are solid."

