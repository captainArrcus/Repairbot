# Heidenhain TNC / iTNC Error Message Database (Seed)
# Source: Heidenhain documentation portal + service manuals
# Support: +49 8669 31-3101 / service.nc-support@heidenhain.de

controller_family: HEIDENHAIN_TNC
source_url: "https://www.heidenhain.com"
last_updated: "2026-05-26"

errors:
  - code: "ERROR 1100"
    category: axis
    message_en: "Axis: Contour monitoring triggered"
    probable_causes: ["Mechanical overload", "Ball screw worn", "Encoder error"]
    related_components: [ball_screw, encoder, servo_drive]

  - code: "ERROR 1110"
    category: axis
    message_en: "Axis: Position monitoring triggered"
    probable_causes: ["Following error exceeded", "Mechanical binding", "Lubrication failure"]
    related_components: [encoder, ball_screw, linear_guide]

  - code: "ERROR 1200"
    category: axis
    message_en: "Axis: Reference run not possible"
    probable_causes: ["Ref switch defective", "Encoder zero mark missing", "At limit"]
    related_components: [reference_switch, encoder, limit_switch]

  - code: "ERROR 1300"
    category: encoder
    message_en: "Encoder: Signal level too low"
    probable_causes: ["Glass disk contaminated", "Cable damaged", "LED aging"]
    related_components: [encoder, encoder_cable]

  - code: "ERROR 2000"
    category: spindle
    message_en: "Spindle: Speed not reached"
    probable_causes: ["Drive overloaded", "Belt slipping", "Bearing damaged"]
    related_components: [spindle_motor, spindle_belt, spindle_bearing]

  - code: "ERROR 2010"
    category: spindle
    message_en: "Spindle: Orientation error"
    probable_causes: ["Encoder invalid", "Orientation sensor defective", "Brake not releasing"]
    related_components: [spindle_encoder, orientation_sensor, spindle_brake]

  - code: "ERROR 3000"
    category: tool_management
    message_en: "Tool change: Error in sequence"
    probable_causes: ["Tool not seated", "Gripper jammed", "Pneumatic low", "Sensor fault"]
    related_components: [tool_changer, tool_magazine, pneumatic_system]

  - code: "ERROR 5000"
    category: system
    message_en: "Controller bus: Communication error"
    probable_causes: ["Fieldbus cable loose", "Drive firmware mismatch", "EMC interference"]
    related_components: [fieldbus_cable, drive_module, controller]
