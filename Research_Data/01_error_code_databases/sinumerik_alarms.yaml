# SINUMERIK 840D / 840D sl Alarm Code Database (Seed)
# Source: Siemens Industry Online Support (SIOS) — Diagnostics Manual
# Manual: "SINUMERIK 840D sl Diagnostics Manual: Alarms" (6FC5398-6BP40-xBA0)
# IMPORTANT: Alarm numbers and descriptions are VERSION-SPECIFIC.
#            This seed targets CNC Software Version 4.7 SP2.
#            Always verify against the exact firmware version on the machine.
#
# Structure:
#   Each alarm has: code, category, severity, message (DE+EN),
#   probable_causes, recommended_actions, related_components, manual_reference
#
# Categories:
#   NC  = Numerical Control alarms (000xxx - 099xxx)
#   DRV = Drive/SINAMICS alarms (2xxxxx range, also F/A prefixed)
#   PLC = PLC user alarms (700xxx — OEM-defined, machine-builder specific)
#   HMI = HMI/Operate alarms (100xxx - 199xxx)

controller_family: SINUMERIK_840D_sl
software_version: "4.7 SP2"
source_url: "https://support.industry.siemens.com"
last_updated: "2026-05-26"

alarms:
  # --- NC Alarms: Axis / Drive ---
  - code: "AL 300"
    category: NC
    severity: error
    message_de: "Achse {axis}: Geschwindigkeitsregler-Grenze überschritten"
    message_en: "Axis {axis}: Speed controller limit exceeded"
    probable_causes:
      - "Mechanical overload on axis (collision, tool breakage, chips jamming)"
      - "Drive parameters incorrectly set after servo replacement"
      - "Encoder feedback cable damaged or loose"
      - "Ball screw or linear guide binding (lubrication failure)"
    recommended_actions:
      - "Check axis for mechanical obstructions — move by hand if possible"
      - "Inspect encoder cable connections at motor and drive module"
      - "Compare drive parameters against commissioning backup"
      - "Check lubrication system: oil level, pump function, distribution lines"
    related_components: [servo_drive, encoder, ball_screw, linear_guide]
    manual_reference: "Diagnostics Manual Ch. 12 — Drive Alarms"

  - code: "AL 309"
    category: NC
    severity: error
    message_de: "Achse {axis}: Schleppfehler zu groß"
    message_en: "Axis {axis}: Following error (lag error) too large"
    probable_causes:
      - "Ball screw bearing worn — increased axial play"
      - "Coupling between motor and ball screw loose or damaged"
      - "Mechanical resistance increased (lubrication failure, crash damage)"
      - "Encoder glass disk contaminated or cracked"
      - "Servo drive gain too low after parameter reset"
      - "Axis guide rail contamination or damage"
    recommended_actions:
      - "Check axial play on ball screw: grab table edge, push/pull in axis direction. >0.02mm play = bearing replacement needed"
      - "Inspect motor coupling: look for set screw looseness, coupling element cracks"
      - "Check lubrication: is the oil level adequate? Are distribution lines blocked?"
      - "Run drive commissioning test: check velocity/position loop response"
      - "Inspect encoder: clean glass disk if accessible, check cable shield grounding"
    related_components: [ball_screw, ball_screw_bearing, motor_coupling, encoder, servo_drive]
    manual_reference: "Diagnostics Manual Ch. 12.4 — Drive Alarms"
    discriminating_questions:
      - question: "Can you feel play when pushing/pulling the table in the axis direction?"
        evidence_type: tactile
        expected_format: "mm or yes/no"
        discriminates: "ball_screw_bearing vs motor_coupling"
      - question: "Does the rattling occur only during acceleration or also at constant speed?"
        evidence_type: text
        discriminates: "coupling vs bearing vs lubrication"
      - question: "Has the machine been recently crashed or collided?"
        evidence_type: text
        discriminates: "mechanical_damage vs wear"

  - code: "AL 310"
    category: NC
    severity: error
    message_de: "Achse {axis}: Drehzahl-Sollwert begrenzt"
    message_en: "Axis {axis}: Speed setpoint limited"
    probable_causes:
      - "Requested feed rate exceeds axis maximum velocity"
      - "Acceleration parameter too aggressive for machine mechanical limits"
      - "Machine data MD32000 (maximum axis velocity) incorrectly set"
    recommended_actions:
      - "Reduce programmed feed rate"
      - "Check and adjust machine data MD32000 and MD32300"
      - "Verify acceleration ramp parameters"
    related_components: [servo_drive, ncu]
    manual_reference: "Diagnostics Manual Ch. 12 — Drive Alarms"

  - code: "AL 380"
    category: NC
    severity: warning
    message_de: "Achse {axis}: Stillstandsüberwachung aktiv"
    message_en: "Axis {axis}: Standstill monitoring active"
    probable_causes:
      - "Axis did not reach standstill within expected time"
      - "Brake not engaging properly"
      - "Servo holding torque insufficient"
    recommended_actions:
      - "Check axis brake function"
      - "Check servo holding current parameter"
      - "Inspect for external forces on axis (gravity on vertical axes)"
    related_components: [servo_drive, axis_brake, motor]
    manual_reference: "Diagnostics Manual Ch. 12 — Drive Alarms"

  # --- NC Alarms: Spindle ---
  - code: "AL 500"
    category: NC
    severity: error
    message_de: "Spindel {spindle}: Drehzahl nicht erreicht"
    message_en: "Spindle {spindle}: Speed not reached"
    probable_causes:
      - "Spindle motor overloaded (tool too heavy, cut too deep)"
      - "Spindle drive module fault"
      - "Spindle belt worn or broken (on belt-driven spindles)"
      - "Spindle bearing seized or heavily worn"
      - "Power supply insufficient"
    recommended_actions:
      - "Reduce spindle load (reduce cut depth / feed)"
      - "Check spindle belt tension and condition"
      - "Listen for bearing noise: run spindle unloaded at low RPM"
      - "Check drive module for additional alarms"
    related_components: [spindle_motor, spindle_drive, spindle_belt, spindle_bearing]
    manual_reference: "Diagnostics Manual Ch. 13 — Spindle Alarms"

  - code: "AL 510"
    category: NC
    severity: error
    message_de: "Spindel {spindle}: Orientierung fehlgeschlagen"
    message_en: "Spindle {spindle}: Orientation failed"
    probable_causes:
      - "Spindle encoder fault"
      - "Spindle brake not releasing"
      - "Orientation sensor (proximity switch) defective"
      - "Spindle drive parameter error"
    recommended_actions:
      - "Check spindle encoder signal (diagnostic screen)"
      - "Check spindle brake solenoid and pneumatic pressure"
      - "Verify orientation sensor function with diagnostic input display"
    related_components: [spindle_encoder, spindle_brake, orientation_sensor]
    manual_reference: "Diagnostics Manual Ch. 13 — Spindle Alarms"

  # --- NC Alarms: Tool Management ---
  - code: "AL 600"
    category: NC
    severity: error
    message_de: "Werkzeugwechsel: Timeout"
    message_en: "Tool change: Timeout"
    probable_causes:
      - "Tool magazine mechanical jam"
      - "Pneumatic pressure too low for gripper/clamp"
      - "Tool change arm obstruction (chips, coolant buildup)"
      - "PLC sequence error (sensor not detecting tool presence)"
    recommended_actions:
      - "Check pneumatic pressure gauge (should be >5 bar typically)"
      - "Visually inspect tool magazine for mechanical blockage"
      - "Clean tool change area of chips and coolant residue"
      - "Check PLC inputs: tool-in-spindle sensor, magazine-position sensor"
    related_components: [tool_magazine, tool_changer, pneumatic_system, plc_inputs]
    manual_reference: "Diagnostics Manual Ch. 14 — Tool Management"

  # --- SINAMICS Drive Alarms ---
  - code: "F07011"
    category: DRV
    severity: fault
    message_de: "Motor Übertemperatur"
    message_en: "Motor overtemperature"
    probable_causes:
      - "Motor cooling fan failed"
      - "Continuous high load operation"
      - "Motor temperature sensor (KTY/PTC) fault"
      - "Ambient temperature too high (machine enclosure ventilation)"
    recommended_actions:
      - "Check motor fan operation"
      - "Reduce machining load / cycle duty"
      - "Verify motor temperature sensor reading in diagnostics"
      - "Check machine enclosure ventilation and filters"
    related_components: [servo_motor, motor_fan, temperature_sensor]
    manual_reference: "SINAMICS S120 List Manual — Faults and Alarms"

  - code: "F07014"
    category: DRV
    severity: fault
    message_de: "Leistungsmodul Übertemperatur"
    message_en: "Power module overtemperature"
    probable_causes:
      - "Power module fan failed or filter clogged"
      - "Ambient temperature in electrical cabinet too high"
      - "Drive overloaded (wrong motor/drive sizing)"
    recommended_actions:
      - "Check and clean power module fan and filter"
      - "Check electrical cabinet door seals and cooling unit"
      - "Verify drive/motor sizing against actual load profile"
    related_components: [power_module, cabinet_cooling, drive_fan]
    manual_reference: "SINAMICS S120 List Manual — Faults and Alarms"

  - code: "F07016"
    category: DRV
    severity: fault
    message_de: "Achse {axis}: DRIVE-CLiQ Kommunikationsfehler"
    message_en: "Axis {axis}: DRIVE-CLiQ communication error"
    probable_causes:
      - "DRIVE-CLiQ cable loose or damaged"
      - "SMC (Sensor Module Cabinet) fault"
      - "Encoder connection failure"
      - "EMC interference on DRIVE-CLiQ cable"
    recommended_actions:
      - "Check all DRIVE-CLiQ cable connections: push connectors firmly"
      - "Replace DRIVE-CLiQ cable (try known good cable)"
      - "Check cable routing: must be away from power cables (>20cm separation)"
      - "Check SMC module LED status"
    related_components: [drive_cliq_cable, smc_module, encoder, ncu]
    manual_reference: "SINAMICS S120 Diagnostics — DRIVE-CLiQ"

  - code: "F30021"
    category: DRV
    severity: fault
    message_de: "Geber: Nullmarke fehlt"
    message_en: "Encoder: Reference mark missing"
    probable_causes:
      - "Encoder glass disk contaminated"
      - "Encoder cable damaged (shield broken)"
      - "Encoder mounting displaced after collision"
      - "Encoder defective (internal electronics)"
    recommended_actions:
      - "Clean encoder glass disk with lint-free cloth and IPA"
      - "Check encoder cable: shield continuity, connector pins"
      - "Verify encoder mounting bolt torque"
      - "Try replacing encoder with known good unit"
    related_components: [encoder, encoder_cable, encoder_mounting]
    manual_reference: "SINAMICS S120 Diagnostics — Encoder Faults"

  - code: "F30024"
    category: DRV
    severity: fault
    message_de: "Geber: Frequenzgrenze überschritten"
    message_en: "Encoder: Frequency limit exceeded"
    probable_causes:
      - "Axis moved too fast (reference run speed too high)"
      - "Encoder resolution mismatch with drive configuration"
      - "Mechanical vibration causing false encoder pulses"
    recommended_actions:
      - "Reduce reference run speed"
      - "Verify encoder configuration in drive parameters"
      - "Check for mechanical vibrations at encoder mounting"
    related_components: [encoder, servo_drive]
    manual_reference: "SINAMICS S120 Diagnostics — Encoder Faults"

  # --- PLC Alarms (OEM-specific, examples from common machine builders) ---
  - code: "AL 700001"
    category: PLC
    severity: warning
    message_de: "Hydraulik: Ölstand zu niedrig"
    message_en: "Hydraulics: Oil level too low"
    probable_causes:
      - "Hydraulic oil leak"
      - "Oil consumption higher than expected (worn seals)"
      - "Oil level sensor malfunction"
    recommended_actions:
      - "Check hydraulic oil level visually"
      - "Inspect hydraulic lines and cylinders for leaks"
      - "Top up hydraulic oil to correct level"
    related_components: [hydraulic_unit, oil_level_sensor, hydraulic_lines]
    manual_reference: "Machine builder documentation (OEM-specific)"
    note: "PLC alarms in 700xxx range are defined by the machine tool builder, NOT by Siemens"

  - code: "AL 700042"
    category: PLC
    severity: error
    message_de: "Kühlmittelstand zu niedrig"
    message_en: "Coolant level too low"
    probable_causes:
      - "Coolant tank needs refilling"
      - "Coolant leak in supply lines"
      - "Coolant level sensor malfunction"
    recommended_actions:
      - "Check and refill coolant tank"
      - "Inspect coolant supply lines for leaks"
      - "Clean coolant level sensor"
    related_components: [coolant_tank, coolant_pump, coolant_sensor]
    manual_reference: "Machine builder documentation (OEM-specific)"
    note: "PLC alarms in 700xxx range are defined by the machine tool builder"

  # --- HMI / Communication ---
  - code: "AL 120100"
    category: HMI
    severity: error
    message_de: "HMI: Verbindung zum NCU unterbrochen"
    message_en: "HMI: Connection to NCU lost"
    probable_causes:
      - "Network cable between HMI and NCU disconnected"
      - "NCU crashed or hangs"
      - "Network switch in electrical cabinet failed"
    recommended_actions:
      - "Check Ethernet cable connection between HMI panel and NCU"
      - "Power cycle the NCU (wait 30 seconds)"
      - "Check network switch LED status"
    related_components: [hmi_panel, ncu, network_switch, ethernet_cable]
    manual_reference: "Diagnostics Manual Ch. 10 — HMI Alarms"
