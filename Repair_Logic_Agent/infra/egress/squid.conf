# Feature 2.5 (spec D8) — egress allowlist for the agent worker container.
# The worker's only legitimate egress is the LLM endpoint (+ models.dev, the
# metadata fetch hermes does on first boot — 0.2 spike finding #7). S3 and
# Langfuse are the PARENT's egress needs; tool RPC keeps them out of the
# agent process entirely.
http_port 3128

acl allowed_llm dstdomain .googleapis.com
acl allowed_llm dstdomain .anthropic.com
acl allowed_llm dstdomain models.dev

acl SSL_ports port 443
acl Safe_ports port 80 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow allowed_llm
http_access deny all
